spring.application.name=ItOfficerHub
# Load .env from project root (use spring.datasource.* keys inside .env)
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# Runs before Hibernate on startup — adds missing columns/tables on Neon/Render
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Must be 0: default baseline 1 skips V1__ migrations on first connect
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# In-memory cache (Caffeine) — see CacheConfig.java for per-cache TTL
spring.cache.type=caffeine

# HikariCP — Neon pooler: keep pool small, reuse connections
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.keepalive-time=120000

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:ItOfficerHubSuperSecretKeyForJWTTokenGenerationMustBeLongEnough256bits}
app.jwt.expiration-ms=86400000

app.admin.email=${ADMIN_EMAIL:admin@itofficerhub.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=Administrator

# Startup seed: admin user only when missing (no mocks)
app.seed.admin.enabled=${SEED_ADMIN:true}
# One-time: set SEED_WIPE_MOCKS=true to delete ALL mocks/attempts, then set back to false
app.seed.wipe-mocks=${SEED_WIPE_MOCKS:false}

app.exam.cutoff-marks=10

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
