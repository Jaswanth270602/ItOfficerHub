spring.application.name=ItOfficerHub
# Load .env from project root (use spring.datasource.* keys inside .env)
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:ItOfficerHubSuperSecretKeyForJWTTokenGenerationMustBeLongEnough256bits}
app.jwt.expiration-ms=86400000

app.admin.email=${ADMIN_EMAIL:admin@itofficerhub.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=Administrator

app.exam.cutoff-marks=10

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
