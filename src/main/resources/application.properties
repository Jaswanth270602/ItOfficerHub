spring.application.name=ItOfficerHub

# PostgreSQL (local Docker, Neon, Supabase, Render external DB)
# Override with SPRING_DATASOURCE_URL for a full JDBC URL (recommended on Neon)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:itofficerhub}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

# JWT — set JWT_SECRET in production (32+ chars)
app.jwt.secret=${JWT_SECRET:ItOfficerHubSuperSecretKeyForJWTTokenGenerationMustBeLongEnough256bits}
app.jwt.expiration-ms=86400000

# Admin seed (first run only)
app.admin.email=${ADMIN_EMAIL:admin@itofficerhub.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=Administrator

app.exam.cutoff-marks=10

# Comma-separated frontend URLs (Render static site + local dev)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
