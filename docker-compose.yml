services:
  db:
    image: postgres:16-alpine
    container_name: itofficerhub-db
    environment:
      POSTGRES_DB: itofficerhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - itofficerhub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d itofficerhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  itofficerhub_pg:
