# Render Blueprint — one Web Service (API + React UI in Docker JAR)
# Set secrets in Render Dashboard after first deploy (see README / DEPLOY.md)

services:
  - type: web
    name: itofficerhub
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/public/stats
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: JPA_SHOW_SQL
        value: "false"
      - key: PORT
        value: "8080"
      - key: CORS_ORIGINS
        value: https://itofficerhub.onrender.com
