# Render Blueprint — https://render.com/docs/blueprint-spec
# 1) Create free Postgres on Neon → copy DATABASE_URL
# 2) Deploy this repo on Render → "New Blueprint"
# 3) Set CORS_ORIGINS to your static site URL after first deploy

services:
  - type: web
    name: itofficerhub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/public/stats
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://itofficerhub.onrender.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: "8080"

  - type: web
    name: itofficerhub-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://itofficerhub-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
